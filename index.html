<body>

    <main class="container">

        <div class="card">
          <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">🔥 語学学習ストリーク記録</h2>

          <label style="font-size:13px;font-weight:600;color:#374151;">学習日 <span style="color:#1D4ED8;">*</span></label>
          <input type="date" id="studyDate" style="margin-bottom:10px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
            <div>
              <label style="font-size:13px;font-weight:600;color:#374151;">学習言語 <span style="color:#1D4ED8;">*</span></label>
              <select id="studyLang" style="width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;background:#fff;">
                <option value="英語">英語</option>

                <option value="スペイン語">スペイン語</option>

              </select>
            </div>
            <div>
              <label style="font-size:13px;font-weight:600;color:#374151;">学習時間（分） <span style="color:#1D4ED8;">*</span></label>
              <input type="number" id="studyMinutes" placeholder="例: 30" min="1" max="600">
            </div>
          </div>
          <label style="font-size:13px;font-weight:600;color:#374151;">学習内容</label>
          <input type="text" id="studyContent" placeholder="例: 単語50個・リスニング練習・文法復習" style="margin-bottom:10px;">
          <label style="font-size:13px;font-weight:600;color:#374151;">一言メモ</label>
          <input type="text" id="studyNote" placeholder="例: 発音が難しかった・集中できた">
          <button class="btn" style="margin-top:16px;" onclick="generate()">学習を記録する</button>

        </div>
        <div class="card" style="margin-top:12px;">
          <h2 style="font-size:16px;font-weight:700;margin-bottom:4px;">📅 直近28日カレンダー</h2>
          <p style="font-size:12px;color:#94a3b8;margin-bottom:0;">青＝学習済み</p>
          <div id="cal-grid" class="cal-grid"></div>
        </div>
        <div class="card" style="margin-top:12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <h2 style="font-size:16px;font-weight:700;">📋 学習ログ</h2>
            <span id="entry-count" style="font-size:12px;color:#999;"></span>
          </div>
          <div id="entries">
            <p style="text-align:center;color:#bbb;font-size:14px;padding:20px;">まだ記録がありません</p>
          </div>
        </div>

    <script>
    const BTN_COLOR = '#1D4ED8';
    const STORAGE_KEY = 'language-learning-streak-entries';
    let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    document.addEventListener('DOMContentLoaded', () => {{
      // 今日の日付をデフォルトにセット
      document.getElementById('studyDate').value = todayStr();
      renderStreakHero();
      renderTodayBanner();
      renderCalendar();
      renderEntries();
    }});

    function todayStr() {{
      return new Date().toISOString().slice(0, 10);
    }}

    function generate() {{
      const date = document.getElementById('studyDate').value;
      const lang = document.getElementById('studyLang').value;
      const minutes = parseInt(document.getElementById('studyMinutes').value, 10);
      const content = document.getElementById('studyContent').value.trim();
      const note = document.getElementById('studyNote').value.trim();

      if (!date) {{ alert('学習日を選択してください'); return; }}
      if (!minutes || minutes <= 0) {{ alert('学習時間（分）を入力してください'); return; }}

      // 同日・同言語の既存レコードがあれば上書き
      const existIdx = entries.findIndex(e => e.studyDate === date && e.lang === lang);
      const entry = {{ id: existIdx >= 0 ? entries[existIdx].id : Date.now(), date: new Date().toLocaleDateString('ja-JP'), studyDate: date, lang: lang, minutes: minutes, content: content, note: note }};
      if (existIdx >= 0) {{ entries[existIdx] = entry; }} else {{ entries.unshift(entry); }}
      entries.sort((a, b) => b.studyDate.localeCompare(a.studyDate));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));

      const streak = calcStreak();
      const totalMin = entries.reduce((s, e) => s + (e.minutes || 0), 0);
      const output = `
        <div style="text-align:center;padding:10px 0;">
          <div style="font-size:36px;">🔥</div>
          <div style="font-size:28px;font-weight:800;color:#1D4ED8;">${{streak}} 日連続！</div>
          <p style="color:#475569;font-size:13px;margin-top:6px;">累計学習: ${{totalMin}}分（${{Math.floor(totalMin/60)}}時間${{totalMin%60}}分）</p>
          <p style="color:#15803d;font-size:13px;font-weight:600;">✅ ${{date.replace(/-/g,'/')}} の学習を記録しました（${{lang}} ${{minutes}}分）</p>
        </div>`;

      document.getElementById('output').innerHTML = output;
      document.getElementById('result').classList.add('show');
      document.getElementById('result').scrollIntoView({{ behavior: 'smooth', block: 'start' }});

      // リセット
      document.getElementById('studyDate').value = todayStr();
      document.getElementById('studyMinutes').value = '';
      document.getElementById('studyContent').value = '';
      document.getElementById('studyNote').value = '';

      renderStreakHero();
      renderTodayBanner();
      renderCalendar();
      renderEntries();
    }}

    function calcStreak() {{
      // 日付ユニーク集合
      const doneSet = new Set(entries.map(e => e.studyDate));
      let streak = 0;
      const d = new Date(); d.setHours(0,0,0,0);
      // 今日か昨日から始まるストリーク
      const todayKey = d.toISOString().slice(0,10);
      const yestKey = new Date(d.getTime() - 86400000).toISOString().slice(0,10);
      let cursor = doneSet.has(todayKey) ? new Date(d) : (doneSet.has(yestKey) ? new Date(d.getTime() - 86400000) : null);
      if (!cursor) return 0;
      while (true) {{
        const key = cursor.toISOString().slice(0,10);
        if (!doneSet.has(key)) break;
        streak++;
        cursor = new Date(cursor.getTime() - 86400000);
      }}
      return streak;
    }}

    function calcLongestStreak() {{
      if (entries.length === 0) return 0;
      const dates = [...new Set(entries.map(e => e.studyDate))].sort();
      let longest = 1, cur = 1;
      for (let i = 1; i < dates.length; i++) {{
        const prev = new Date(dates[i-1]); const curr = new Date(dates[i]);
        const diff = (curr - prev) / 86400000;
        if (diff === 1) {{ cur++; longest = Math.max(longest, cur); }} else {{ cur = 1; }}
      }}
      return longest;
    }}

    function renderStreakHero() {{
      const streak = calcStreak();
      const flame = streak >= 30 ? '🏆' : streak >= 14 ? '💪' : streak >= 7 ? '🔥' : streak >= 1 ? '✨' : '😴';
      const msg = streak >= 30 ? '素晴らしい継続力！' : streak >= 14 ? '2週間突破！' : streak >= 7 ? '1週間達成！' : streak >= 1 ? '継続中！' : '今日から始めよう';
      document.getElementById('streak-hero-area').innerHTML = `
        <div class="streak-hero">
          <div class="streak-flame">${{flame}}</div>
          <div class="streak-count">${{streak}}<span class="streak-unit">日</span></div>
          <div class="streak-sub">${{msg}}</div>
        </div>`;
    }}

    function renderTodayBanner() {{
      const today = todayStr();
      const hasTodayEntry = entries.some(e => e.studyDate === today);
      const banner = document.getElementById('today-banner');
      if (hasTodayEntry) {{
        banner.innerHTML = '<div class="today-done-banner">✅ 今日の学習は記録済みです！</div>';
      }} else {{
        banner.innerHTML = '';
      }}
    }}

    function renderCalendar() {{
      const grid = document.getElementById('cal-grid');
      const doneSet = new Set(entries.map(e => e.studyDate));
      const today = new Date(); today.setHours(0,0,0,0);
      const todayKey = today.toISOString().slice(0,10);
      // 28日分
      const days = [];
      for (let i = 27; i >= 0; i--) {{
        const d = new Date(today.getTime() - i * 86400000);
        days.push(d);
      }}
      // 先頭を日曜揃えのために空白追加
      const firstDow = days[0].getDay(); // 0=Sun
      let html = '';
      for (let i = 0; i < firstDow; i++) html += '<div class="cal-day empty"></div>';
      days.forEach(d => {{
        const key = d.toISOString().slice(0,10);
        const done = doneSet.has(key);
        const isToday = key === todayKey;
        html += `<div class="cal-day${{done?' done':''}}${{isToday?' today':''}} " title="${{key}}">${{d.getDate()}}</div>`;
      }});
      grid.innerHTML = html;
    }}

    function deleteEntry(id) {{
      entries = entries.filter(e => e.id !== id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      renderStreakHero();
      renderTodayBanner();
      renderCalendar();
      renderEntries();
    }}

    function renderEntries() {{
      const container = document.getElementById('entries');
      document.getElementById('entry-count').textContent = entries.length + '件';
      if (entries.length === 0) {{
        container.innerHTML = '<p style="text-align:center;color:#bbb;font-size:14px;padding:20px;">まだ記録がありません</p>';
        return;
      }}
      const totalMin = entries.reduce((s, e) => s + (e.minutes || 0), 0);
      const longest = calcLongestStreak();
      // サマリー行を追加
      const summaryHtml = `
        <div class="summary-grid" style="margin-bottom:12px;">
          <div class="summary-item">
            <div class="summary-num">${{entries.length}}</div>
            <div class="summary-label">学習日数</div>
          </div>
          <div class="summary-item">
            <div class="summary-num">${{Math.floor(totalMin/60)}}<span style="font-size:14px;">h</span></div>
            <div class="summary-label">累計時間</div>
          </div>
          <div class="summary-item">
            <div class="summary-num">${{longest}}</div>
            <div class="summary-label">最長ストリーク</div>
          </div>
        </div>`;
      const logsHtml = entries.slice(0, 30).map(e => `
        <div class="log-row">
          <div class="log-info">
            <div class="log-date">${{e.studyDate.replace(/-/g,'/')}}
              <span class="lang-badge">${{e.lang}}</span>
              <span style="font-size:12px;color:#1D4ED8;font-weight:700;">${{e.minutes}}分</span>
            </div>
            ${{e.content ? '<div class="log-meta">📖 ' + e.content + '</div>' : ''}}
            ${{e.note ? '<div class="log-note">💬 ' + e.note + '</div>' : ''}}
          </div>
          <button onclick="deleteEntry(${{e.id}})" style="color:#ef4444;background:none;border:none;cursor:pointer;font-size:12px;flex-shrink:0;">削除</button>
        </div>`).join('');
      container.innerHTML = summaryHtml + logsHtml;
    }}
    </script>
